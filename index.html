<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tavio – Categorized Prompt Library</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/tavio.css">
</head>
<body>

    <header class="glass-header">
        <div class="header-inner">
            <img src="/assets/favicon.svg"
                 alt="tavio Logo"
                 class="header-logo"
                 onerror="this.style.display='none'">
            <div class="header-text">
                <h1 class="tool-name">tavio</h1>
                <h2 class="tool-tagline">Categorized Prompt Library</h2>
            </div>
        </div>
        <p class="tool-description">Save, organize, and instantly complete your prompts — fill in the blanks, generate, and copy in seconds.</p>
    </header>

    <main class="main-container">

        <!-- Library Panel -->
        <section class="library-panel" id="libraryPanel">
            <div class="panel-header">
                <h3 class="panel-title">Prompt Library</h3>
                <button class="btn-icon" id="addPromptBtn" title="Add new prompt">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>

            <div class="search-wrap">
                <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search prompts…">
            </div>

            <div class="category-filter" id="categoryFilter">
                <button class="cat-chip active" data-cat="all">All</button>
            </div>

            <div class="prompt-list" id="promptList">
                <!-- Prompt cards rendered here -->
            </div>

            <div class="empty-state" id="emptyState">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 8 9"/></svg>
                <p>No prompts yet. Add your first one.</p>
            </div>
        </section>

        <!-- Editor / Use Panel -->
        <section class="use-panel" id="usePanel">

            <!-- Add / Edit Form -->
            <div class="form-card" id="formCard" style="display:none;">
                <div class="form-card-header">
                    <h3 id="formTitle">New Prompt</h3>
                    <button class="btn-icon" id="closeFormBtn" title="Close">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="form-group">
                    <label class="form-label" for="promptName">Prompt Title</label>
                    <input type="text" id="promptName" class="form-input" placeholder="e.g. Blog Post Outline">
                </div>
                <div class="form-group">
                    <label class="form-label" for="promptCategory">Category</label>
                    <input type="text" id="promptCategory" class="form-input" placeholder="e.g. Writing, Marketing, Code…">
                </div>
                <div class="form-group">
                    <label class="form-label" for="promptTemplate">
                        Prompt Template
                        <span class="label-hint">Wrap input fields in <code>{{curly braces}}</code></span>
                    </label>
                    <textarea id="promptTemplate" class="form-textarea" rows="7" placeholder="Write a {{tone}} blog post about {{topic}} targeting {{audience}}."></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn-ghost" id="cancelFormBtn">Cancel</button>
                    <button class="btn-accent" id="savePromptBtn">Save Prompt</button>
                </div>
            </div>

            <!-- Use Prompt Area -->
            <div class="use-card" id="useCard">
                <div class="use-placeholder" id="usePlaceholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <p>Select a prompt from the library to get started.</p>
                </div>

                <div class="use-content" id="useContent" style="display:none;">
                    <div class="use-header">
                        <div>
                            <h3 class="use-title" id="useTitle"></h3>
                            <span class="use-category-badge" id="useCategoryBadge"></span>
                        </div>
                        <div class="use-header-actions">
                            <button class="btn-icon" id="editActiveBtn" title="Edit this prompt">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button class="btn-icon btn-danger" id="deleteActiveBtn" title="Delete this prompt">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="fields-grid" id="fieldsGrid">
                        <!-- Dynamic fields rendered here -->
                    </div>

                    <div class="use-actions">
                        <button class="btn-accent btn-generate" id="generateBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            Generate Prompt
                        </button>
                    </div>

                    <div class="output-area" id="outputArea" style="display:none;">
                        <div class="output-label">Generated Prompt</div>
                        <div class="output-text" id="outputText" aria-live="polite" aria-label="Generated prompt output"></div>
                        <div class="output-actions" id="outputActions" style="display:none;">
                            <button class="btn-accent btn-copy" id="copyBtn">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                Copy
                            </button>
                            <button class="btn-ghost btn-reset" id="resetBtn">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
                                Reset
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-signature">
            <a href="https://arminsilatani.com/en/"
               target="_blank"
               rel="noopener noreferrer"
               title="Armin Silatani | Official Website">
                <span class="crafted">crafted by</span>
                <img src="assets/ArminSilatani.svg"
                     alt="Armin Silatani"
                     class="signature">
            </a>
        </div>
    </footer>

    <script src="assets/tavio.js" defer></script>
</body>
</html>
