<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tavio • Prompt Library</title>
    <link rel="stylesheet" href="assets/tavio.css">
    <script src="assets/tavio.js" defer></script>
</head>
<body>
    <div class="glass-header">
        <div class="header-inner">
            <img src="assets/favicon.svg" alt="tavio Logo" class="header-logo" onerror="this.style.display='none'">
            <div class="header-text">
                <h1 class="tool-name">tavio</h1>
                <h2 class="tool-tagline">Categorized Prompt Library</h2>
            </div>
        </div>
        <p class="tool-description">Organize your prompts, auto-detect variables, and generate filled prompts with typing animation.</p>
    </div>

    <main class="main-container">
        <!-- LIBRARY VIEW -->
        <div id="library-view" class="view active">
            <div class="controls">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search prompts..." onkeyup="filterPrompts()">
                </div>
                <button onclick="showNewPromptModal()" class="btn-primary">+ New Prompt</button>
            </div>

            <div class="categories">
                <button onclick="filterByCategory('all')" class="category-chip active" id="cat-all">All</button>
                <button onclick="filterByCategory('writing')" class="category-chip" id="cat-writing">Writing</button>
                <button onclick="filterByCategory('coding')" class="category-chip" id="cat-coding">Coding</button>
                <button onclick="filterByCategory('marketing')" class="category-chip" id="cat-marketing">Marketing</button>
                <button onclick="filterByCategory('business')" class="category-chip" id="cat-business">Business</button>
            </div>

            <div id="prompt-grid" class="prompt-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- EDITOR VIEW -->
        <div id="editor-view" class="view">
            <div class="editor-header">
                <button onclick="backToLibrary()" class="btn-secondary">← Back to Library</button>
                <div class="editor-title">
                    <h3 id="current-prompt-title">Prompt Editor</h3>
                </div>
                <button onclick="saveCurrentPrompt()" class="btn-primary">Save to Library</button>
            </div>

            <div class="editor-content">
                <div class="template-section">
                    <label class="section-label">Prompt Template</label>
                    <textarea id="template-textarea" placeholder="Enter your prompt template here. Use {{variable}} for placeholders.&#10;Example: Write a story about {{character}} in {{setting}}."></textarea>
                </div>

                <div class="variables-section">
                    <label class="section-label">Detected Variables</label>
                    <div id="variables-container" class="variables-grid">
                        <!-- Dynamic fields populated by JS -->
                    </div>
                    <button onclick="detectVariables()" class="btn-secondary small">Detect Variables</button>
                </div>

                <div class="generate-section">
                    <button onclick="generatePrompt()" class="btn-generate">
                        <span>Generate Prompt</span>
                    </button>
                </div>

                <div class="result-section">
                    <label class="section-label">Generated Prompt</label>
                    <div id="result-display" class="result-display"></div>
                    
                    <div id="result-actions" class="result-actions hidden">
                        <button onclick="copyPrompt()" class="btn-copy">Copy</button>
                        <button onclick="resetAll()" class="btn-secondary">New Prompt</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- NEW PROMPT MODAL -->
    <div id="new-prompt-modal" class="modal hidden">
        <div class="modal-content">
            <h3>New Prompt Template</h3>
            <input type="text" id="modal-title" placeholder="Prompt Title" class="modal-input">
            <select id="modal-category" class="modal-input">
                <option value="writing">Writing</option>
                <option value="coding">Coding</option>
                <option value="marketing">Marketing</option>
                <option value="business">Business</option>
            </select>
            <textarea id="modal-template" placeholder="Paste your prompt template..."></textarea>
            <div class="modal-actions">
                <button onclick="hideNewPromptModal()" class="btn-secondary">Cancel</button>
                <button onclick="createNewPrompt()" class="btn-primary">Add to Library</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-signature">
            <a href="https://arminsilatani.com/en/" 
               target="_blank" 
               rel="noopener noreferrer" 
               title="Armin Silatani | Official Website">
                <span class="crafted">crafted by</span>
                <img src="assets/ArminSilatani.svg" 
                     alt="Armin Silatani" 
                     class="signature">
            </a>
        </div>
    </footer>
</body>
</html>
