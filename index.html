<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tavio • Prompt Library</title>
    <link rel="stylesheet" href="assets/tavio.css">
    <link rel="stylesheet" href="https://arminsilatani.github.io/tools/assets/sidebar.css">
    <script src="assets/supabase.min.js" defer></script>
    <script src="https://arminsilatani.github.io/tools/assets/sidebar-component.js" type="module" defer></script>
    <script src="assets/tavio.js" defer></script>
</head>
<body>

<div id="initial-loader" class="fullpage-loader">
    <div class="lds-grid">
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
    </div>
</div>

<div id="auth-overlay" class="auth-overlay hidden">
    <div class="auth-box">
        <img src="assets/favicon.svg" alt="tavio" class="auth-logo">
        <h1>tavio</h1>
        <p class="auth-subtitle">Sign in to manage your prompts</p>

        <div id="step-1" class="auth-step active">
            <input type="email" id="auth-email" class="auth-field" placeholder="Your email" autocomplete="email">
            <p id="auth-error-1" class="auth-error hidden"></p>
            <button id="auth-continue-btn" class="accent-btn auth-full-width">Continue</button>
        </div>

        <div id="step-2-login" class="auth-step">
            <p class="auth-user-email" id="login-email-display"></p>
            <div class="password-field-wrapper">
                <input type="password" id="auth-password-login" class="auth-field" placeholder="Password" autocomplete="current-password">
                <button type="button" class="toggle-password-btn" data-target="auth-password-login">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <p id="auth-error-login" class="auth-error hidden"></p>
            <button id="auth-signin-btn" class="accent-btn auth-full-width">Sign In</button>
            <div class="auth-switch">
                <a href="#" id="forgot-link" class="auth-forgot-link">Forgot password?</a>
            </div>
            <button id="auth-back-to-email" class="auth-back-link">← Back</button>
        </div>

        <div id="step-2-register" class="auth-step">
            <p class="auth-user-email" id="register-email-display"></p>
            <input type="text" id="auth-first-name" class="auth-field" placeholder="First Name">
            <input type="text" id="auth-last-name" class="auth-field" placeholder="Last Name">
            <div class="password-field-wrapper">
                <input type="password" id="auth-password-register" class="auth-field" placeholder="Password (min 6 char)" autocomplete="new-password">
                <button type="button" class="toggle-password-btn" data-target="auth-password-register">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <div class="password-field-wrapper">
                <input type="password" id="auth-password-register-confirm" class="auth-field" placeholder="Confirm password" autocomplete="new-password">
                <button type="button" class="toggle-password-btn" data-target="auth-password-register-confirm">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <p id="auth-error-register" class="auth-error hidden"></p>
            <button id="auth-register-btn" class="accent-btn auth-full-width">Create Account</button>
            <button id="auth-back-to-email-2" class="auth-back-link">← Back</button>

            <div id="auth-register-success" class="auth-success hidden">
                <p>Account created! Please check your email.</p>
                <button id="reg-to-login-btn" class="accent-btn">Go to Sign In</button>
            </div>
        </div>

        <div id="step-forgot" class="auth-step">
            <p class="forgot-description">Enter your email to receive a reset link.</p>
            <input type="email" id="forgot-email" class="auth-field" placeholder="Your email">
            <p id="forgot-message" class="auth-success hidden"></p>
            <button id="auth-reset-btn" class="accent-btn auth-full-width">Send Reset Link</button>
            <button id="auth-back-to-login" class="auth-back-link">← Back to login</button>
        </div>
    </div>
</div>

<div id="app-container" class="app-hidden">
    <main class="main-container">
        <div class="branding-wrapper">
            <div class="branding">
                <img src="assets/favicon.svg" alt="tavio Logo" class="brand-logo" onerror="this.style.display='none'">
                <div class="brand-text">
                    <h1 class="brand-name">tavio</h1>
                    <p class="brand-tagline">Categorized Prompt Library</p>
                </div>
            </div>
        </div>

        <div id="library-view" class="view active">
            <div class="controls">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search prompts...">
                </div>
                <button id="new-prompt-btn" class="btn-primary">+ New Prompt</button>
            </div>

            <div class="categories">
                <button class="category-chip active" data-category="all">All</button>
                <button class="category-chip" data-category="writing">Writing</button>
                <button class="category-chip" data-category="coding">Coding</button>
                <button class="category-chip" data-category="marketing">Marketing</button>
                <button class="category-chip" data-category="business">Business</button>
            </div>

            <div id="prompt-grid" class="prompt-grid"></div>
        </div>

        <div id="editor-view" class="view">
            <div class="editor-header">
                <button id="back-to-library-btn" class="btn-secondary">← Back to Library</button>
                <div class="editor-title">
                    <h3 id="current-prompt-title">Prompt Editor</h3>
                </div>
                <button id="save-prompt-btn" class="btn-primary">Save to Library</button>
            </div>

            <div class="editor-content">
                <div class="template-section">
                    <label class="section-label">Prompt Template</label>
                    <textarea id="template-textarea" placeholder="Enter your prompt template here. Use {{variable}} for placeholders.&#10;Example: Write a story about {{character}} in {{setting}}."></textarea>
                </div>

                <div class="variables-section">
                    <label class="section-label">Detected Variables</label>
                    <div id="variables-container" class="variables-grid"></div>
                    <button id="detect-variables-btn" class="btn-secondary small">Detect Variables</button>
                </div>

                <div class="generate-section">
                    <button id="generate-prompt-btn" class="btn-generate">Generate Prompt</button>
                </div>

                <div class="result-section">
                    <label class="section-label">Generated Prompt</label>
                    <div id="result-display" class="result-display"></div>
                    <div id="result-actions" class="result-actions hidden">
                        <button id="copy-prompt-btn" class="btn-copy">Copy</button>
                        <button id="reset-btn" class="btn-secondary">New Prompt</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="new-prompt-modal" class="modal hidden">
        <div class="modal-content">
            <h3 class="modal-title">New Prompt Template</h3>
            <input type="text" id="modal-title" class="modal-input" placeholder="Prompt Title">
            <select id="modal-category" class="modal-input">
                <option value="writing">Writing</option>
                <option value="coding">Coding</option>
                <option value="marketing">Marketing</option>
                <option value="business">Business</option>
            </select>
            <textarea id="modal-template" class="modal-textarea" placeholder="Paste your prompt template..."></textarea>
            <div class="modal-actions">
                <button id="cancel-modal-btn" class="btn-secondary">Cancel</button>
                <button id="add-prompt-btn" class="btn-primary">Add to Library</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-signature">
            <a href="https://arminsilatani.com/en/" target="_blank" rel="noopener noreferrer">
                <span class="crafted">crafted by</span>
                <img src="assets/ArminSilatani.svg" alt="Armin Silatani" class="signature">
            </a>
        </div>
    </footer>

    <sidebar-component current-app="tavio">
        <div slot="app-content" id="tavio-sidebar-content">
            <div id="tavio-new-prompt-item" class="sidebar-item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="sidebar-item-icon">
                    <line x1="8" y1="2" x2="8" y2="14"></line>
                    <line x1="2" y1="8" x2="14" y2="8"></line>
                </svg>
                <span>New Prompt</span>
            </div>
            <div id="tavio-notif-list" class="sidebar-notif-list"></div>
        </div>
    </sidebar-component>
</div>

</body>
</html>
