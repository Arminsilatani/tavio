<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tavio — Categorized Prompt Library</title>
    <link rel="stylesheet" href="assets/tavio.css">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head>
<body>
    <div class="glass-header">
        <div class="header-inner">
            <img src="/assets/favicon.svg"
                 alt="tavio Logo"
                 class="header-logo"
                 onerror="this.style.display='none'">
            <div class="header-text">
                <h1 class="tool-name">tavio</h1>
                <h2 class="tool-tagline">Categorized Prompt Library</h2>
            </div>
        </div>
        <p class="tool-description">Store templates, auto‑detect fields, and generate prompts with a fluid typing effect.</p>
    </div>

    <main class="container">
        <div class="library-panel">
            <div class="categories" id="categoryList"></div>
            <div class="template-list" id="templateList"></div>
        </div>
        <div class="work-area" id="workArea">
            <div class="template-preview" id="templatePreview"></div>
            <div class="form-section" id="formSection"></div>
            <div class="output-section" id="outputSection">
                <div class="output-display" id="outputDisplay"></div>
                <div class="output-actions" id="outputActions">
                    <button class="btn-copy" id="copyBtn" aria-label="Copy prompt">Copy</button>
                    <button class="btn-clear" id="clearBtn" aria-label="Clear all">Clear</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-signature">
            <a href="https://arminsilatani.com/en/"
               target="_blank"
               rel="noopener noreferrer"
               title="Armin Silatani | Official Website">
                <span class="crafted">crafted by</span>
                <img src="assets/ArminSilatani.svg"
                     alt="Armin Silatani"
                     class="signature">
            </a>
        </div>
    </footer>

    <script src="assets/tavio.js" defer></script>
</body>
</html>
